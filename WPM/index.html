<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TYPETERM — Speed Test</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="container">

    <header>
      <div class="logo">TYPE<span>TERM</span></div>
      <div class="tagline">// measure your keystrokes, mortal</div>
    </header>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">WPM</span>
        <span class="stat-value" id="wpm">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">ACC</span>
        <span class="stat-value" id="accuracy">100<span class="unit">%</span></span>
      </div>
      <div class="stat">
        <span class="stat-label">TIME</span>
        <span class="stat-value" id="timer">60<span class="unit">s</span></span>
      </div>
      <div class="stat">
        <span class="stat-label">ERRORS</span>
        <span class="stat-value" id="errors">0</span>
      </div>
    </div>

    <div class="display-box">
      <div class="box-label">[ PROMPT ]</div>
      <div id="word-display"></div>
    </div>

    <div class="input-wrap">
      <span class="prompt-symbol">❯</span>
      <input
        type="text"
        id="type-input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="begin typing..."
        disabled
      />
      <div class="cursor-blink"></div>
    </div>

    <div class="controls">
      <button id="start-btn" class="btn">[ START ]</button>
      <button id="reset-btn" class="btn btn-secondary">[ RESET ]</button>
      <div class="difficulty">
        <span class="diff-label">DIFFICULTY:</span>
        <button class="diff-btn active" data-diff="easy">EASY</button>
        <button class="diff-btn" data-diff="medium">MEDIUM</button>
        <button class="diff-btn" data-diff="hard">HARD</button>
      </div>
    </div>

    <div id="result-screen" class="result-screen hidden">
      <div class="result-title">// SESSION COMPLETE</div>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-label">FINAL WPM</div>
          <div class="result-val" id="final-wpm">—</div>
        </div>
        <div class="result-item">
          <div class="result-label">ACCURACY</div>
          <div class="result-val" id="final-acc">—</div>
        </div>
        <div class="result-item">
          <div class="result-label">TOTAL ERRORS</div>
          <div class="result-val" id="final-errors">—</div>
        </div>
        <div class="result-item">
          <div class="result-label">GRADE</div>
          <div class="result-val" id="final-grade">—</div>
        </div>
      </div>
      <button id="retry-btn" class="btn">[ RETRY ]</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
